<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Feedback – DayOne</title>

<style>

body{
  margin:0;
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  background: linear-gradient(135deg,#667eea,#764ba2);
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.card{
  background:white;
  width:90%;
  max-width:520px;
  padding:35px;
  border-radius:18px;
  box-shadow:0 20px 50px rgba(0,0,0,0.25);
  animation:fade 0.6s ease;
}

@keyframes fade{
  from{opacity:0; transform:translateY(20px);}
  to{opacity:1; transform:translateY(0);}
}

h1{
  margin:0;
  color:#333;
}

.subtitle{
  color:#777;
  margin-bottom:25px;
}

input, textarea{
  width:100%;
  padding:14px;
  margin-top:10px;
  border-radius:10px;
  border:1px solid #ddd;
  font-size:15px;
  transition:0.2s;
}

input:focus, textarea:focus{
  border-color:#667eea;
  outline:none;
  box-shadow:0 0 0 3px rgba(102,126,234,0.15);
}

textarea{
  min-height:120px;
  resize:vertical;
}

button{
  width:100%;
  margin-top:18px;
  padding:14px;
  border:none;
  border-radius:12px;
  background:linear-gradient(135deg,#667eea,#764ba2);
  color:white;
  font-size:16px;
  font-weight:600;
  cursor:pointer;
  transition:0.25s;
}

button:hover{
  transform:translateY(-2px);
  box-shadow:0 10px 25px rgba(0,0,0,0.25);
}

.footer{
  text-align:center;
  margin-top:18px;
  font-size:13px;
  color:#999;
}

</style>
</head>

<body>

<div class="card">

<h1>Send Feedback</h1>
<div class="subtitle">Help us improve DayOne experience</div>

<form action="mailto:yourmail@gmail.com" method="post" enctype="text/plain">

<label>Your Name</label>
<input type="text" name="name" required>

<label>Email</label>
<input type="email" name="email" required>

<label>Your Feedback</label>
<textarea name="message" required></textarea>

<button type="submit">Submit Feedback</button>

</form>

<div class="footer">
DayOne App • We value your feedback ❤️
</div>

</div>

</body>
</html>
